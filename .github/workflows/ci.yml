name: simulator-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-22.04
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: docker build --build-arg APP=engine-1 -t online-check-in-simulator-engine-1 .
      - run: docker build --build-arg APP=engine-2 -t online-check-in-simulator-engine-2 .
